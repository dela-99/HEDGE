services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hedge_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  auth-service:
    build:
      context: .
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - '3000:3000'
